version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wingman-postgres
    environment:
      POSTGRES_USER: wingman
      POSTGRES_PASSWORD: wingman
      POSTGRES_DB: wingman_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wingman -d wingman_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wingman-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: wingman-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - DATABASE_URL=postgresql+asyncpg://wingman:wingman@postgres:5432/wingman_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change-this-to-a-very-secure-secret-key-for-jwt-tokens
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
