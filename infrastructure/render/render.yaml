services:
  - type: web
    name: wingman-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wingman-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: wingman-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false

  - type: redis
    name: wingman-redis
    ipAllowList: [] # internal access only

databases:
  - name: wingman-db
    databaseName: wingman_db
    user: wingman
