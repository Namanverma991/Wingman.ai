name: Extension CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'extension/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'extension/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'extension/package-lock.json'

    - name: Install dependencies
      run: |
        cd extension
        npm ci

    - name: Run linter
      run: |
        cd extension
        npm run lint || true

    - name: Build extension
      run: |
        cd extension
        npm run build
